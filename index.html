    let currentQuestions = [];
    let currentIdx = 0;
    let score = 100;
    let history = [];

    function startGame() {
        // 隨機抽 5 題
        currentQuestions = [...fullBank].sort(() => 0.5 - Math.random()).slice(0, 5);
        currentIdx = 0; score = 100; history = [];
        showPage('page-game');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= 5) { showResult(); return; }
        document.getElementById('progress-text').innerText = `挑戰進度：${currentIdx + 1} / 5`;
        const q = currentQuestions[currentIdx];
        document.getElementById('q-title').innerText = q.t;
        document.getElementById('q-desc').innerText = q.d;
        document.getElementById('choices-container').innerHTML = `
            <div class="choice-card" onclick="makeChoice('a')">A. ${q.a}</div>
            <div class="choice-card" onclick="makeChoice('b')">B. ${q.b}</div>
        `;
    }

    function makeChoice(type) {
        const q = currentQuestions[currentIdx];
        const isA = (type === 'a');
        score += (isA ? q.a_i : q.b_i);
        if(score > 100) score = 100;
        if(score < 0) score = 0;

        history.push({
            title: q.t,
            action: isA ? q.a : q.b,
            result: isA ? q.a_res : q.b_res,
            isA: isA
        });

        currentIdx++;
        loadQuestion();
    }

    function showResult() {
        showPage('page-result');
        document.getElementById('final-score').innerText = `環保積分：${score}`;
        const review = document.getElementById('review-list');
        review.innerHTML = '';
        history.forEach(item => {
            review.innerHTML += `
                <div class="review-item" style="border-left-color: ${item.isA ? '#4CAF50' : '#F44336'}">
                    <strong style="font-size: 28px;">📍 ${item.title}</strong><br>
                    <div style="margin: 10px 0; font-size: 24px; color: #666;">你的做法：${item.action}</div>
                    <div class="result-box ${item.isA ? 'is-good' : 'is-bad'}">${item.result}</div>
                </div>
            `;
        });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
