<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環保小尖兵：80題情境挑戰</title>
    <style>
        :root {
            --primary: #4CAF50; 
            --secondary: #8BC34A;
            --danger: #F44336;
            --bg: #F1F8E9; 
            --main-font: "Microsoft JhengHei", "微軟正黑體", sans-serif;
        }
        body { font-family: var(--main-font); background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        #game-container { background: white; width: 100%; max-width: 850px; border-radius: 40px; border: 8px solid #FFF; box-shadow: 0 15px 50px rgba(0,0,0,0.1); padding: 40px; text-align: center; }
        h1 { font-size: 50px; color: #2E7D32; margin-bottom: 10px; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #q-title { font-size: 36px; color: #1B5E20; margin: 25px 0 15px 0; font-weight: 900; border-bottom: 2px solid #C8E6C9; padding-bottom: 10px; }
        #q-desc { font-size: 28px; color: #444; line-height: 1.6; margin-bottom: 40px; background: #E8F5E9; padding: 25px; border-radius: 20px; text-align: left; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 20px 60px; font-size: 32px; border-radius: 100px; cursor: pointer; box-shadow: 0 8px 0 #388E3C; font-weight: bold; transition: 0.1s; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #388E3C; }

        .choice-card { background: #FFFFFF; border: 4px solid #C8E6C9; border-radius: 25px; padding: 25px; margin: 20px 0; cursor: pointer; font-size: 28px; font-weight: bold; color: #2E7D32; text-align: left; transition: 0.2s; box-shadow: 0 4px 0 #E0E0E0; }
        .choice-card:hover { background: #F1F8E9; border-color: #8BC34A; transform: scale(1.02); }

        .review-item { text-align: left; background: #FAFAFA; padding: 25px; border-radius: 20px; margin-bottom: 25px; border-left: 12px solid #CCC; }
        .result-box { margin-top: 15px; padding: 15px; border-radius: 12px; font-size: 22px; line-height: 1.5; font-weight: bold; }
        .is-good { background-color: #E8F5E9; color: #2E7D32; border: 2px solid #A5D6A7; }
        .is-bad { background-color: #FFEBEE; color: #C62828; border: 2px solid #FFCDD2; }
        
        .score-display { font-size: 65px; font-weight: bold; color: #2E7D32; margin: 10px 0; }
        .rank-display { font-size: 40px; color: #E65100; font-weight: 900; margin-bottom: 30px; padding: 15px; background: #FFF3E0; border-radius: 15px; display: inline-block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="page-intro" class="page active">
        <h1>🌿 環保小尖兵</h1>

        <div id="question-area">
            <h3 id="q-title"></h3>
            <p id="q-desc"></p>
            <div id="choices-container"></div>
        </div>

        <button class="btn-main" onclick="location.reload()">再玩一次</button>
    </div>
</div>

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let history = [];

    function startGame() {
        currentQuestions = [...fullBank].sort(() => 0.5 - Math.random()).slice(0, 5);
        currentIdx = 0; 
        score = 0; 
        history = [];
        showPage('page-game');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= 5) { showResult(); return; }
        document.getElementById('progress-text').innerText = `任務進度：${currentIdx + 1} / 5`;
        const q = currentQuestions[currentIdx];
        document.getElementById('q-title').innerText = q.t;
        document.getElementById('q-desc').innerText = q.d;
        document.getElementById('choices-container').innerHTML = `
            <div class="choice-card" onclick="makeChoice('a')">A. ${q.a}</div>
            <div class="choice-card" onclick="makeChoice('b')">B. ${q.b}</div>
        `;
    }

    function makeChoice(type) {
        const q = currentQuestions[currentIdx];
        const isA = (type === 'a');
        if(isA) score += 20;

        history.push({
            title: q.t,
            action: isA ? q.a : q.b,
            result: isA ? q.a_res : q.b_res,
            isA: isA
        });

        currentIdx++;
        loadQuestion();
    }

    function getRank(s) {
        if (s === 100) return "🌟 偉大的環境守護者";
        if (s === 80) return "🌳 環保親善大使";
        if (s === 60) return "🌱 環保小尖兵";
        if (s === 40) return "🚶 節能實習生";
        if (s === 20) return "⚠️ 環境路人甲";
        return "🔥 環境破壞者";
    }

    function showResult() {
        showPage('page-result');
        document.getElementById('final-score').innerText = `${score} 分`;
        document.getElementById('final-rank').innerText = `獲得稱號：${getRank(score)}`;
        
        const review = document.getElementById('review-list');
        review.innerHTML = '';
        history.forEach(item => {
            review.innerHTML += `
                <div class="review-item" style="border-left-color: ${item.isA ? '#4CAF50' : '#F44336'}">
                    <strong style="font-size: 26px;">📍 ${item.title}</strong><br>
                    <div style="margin: 8px 0; font-size: 22px; color: #666;">你的決策：${item.action}</div>
                    <div class="result-box ${item.isA ? 'is-good' : 'is-bad'}">${item.result}</div>
                </div>
            `;
        });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
